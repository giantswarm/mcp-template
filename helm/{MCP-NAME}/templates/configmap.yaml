apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mcp-template.fullname" . }}
  labels: {{- include "mcp-template.labels" . | nindent 4 }}
data:
  MCP_TRANSPORT: streamable-http
  MCP_ADDR: ":8080"
  METRICS_ADDR: ":9091"
  LOG_FORMAT: json
  {{- if .Values.oauth.enabled }}
  OAUTH_ENABLED: "true"
  OAUTH_ISSUER: {{ .Values.oauth.issuerURL | quote }}
  DEX_ISSUER_URL: {{ .Values.oauth.dex.issuerURL | quote }}
  OAUTH_STORAGE: {{ .Values.storage.kind | quote }}
  {{- if .Values.oauth.trustedAudiences }}
  OAUTH_TRUSTED_AUDIENCES: {{ join "," .Values.oauth.trustedAudiences | quote }}
  {{- end }}
  {{- if .Values.oauth.trustedRedirectSchemes }}
  OAUTH_TRUSTED_REDIRECT_SCHEMES: {{ join "," .Values.oauth.trustedRedirectSchemes | quote }}
  {{- end }}
  {{- else }}
  OAUTH_ENABLED: "false"
  {{- end }}
  {{- if eq .Values.storage.kind "valkey" }}
  VALKEY_ADDR: {{ .Values.storage.valkey.address | quote }}
  VALKEY_TLS: {{ .Values.storage.valkey.tls | quote }}
  {{- end }}
  {{- if .Values.otel.endpoint }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.otel.endpoint | quote }}
  OTEL_EXPORTER_OTLP_PROTOCOL: {{ .Values.otel.protocol | quote }}
  {{- end }}
