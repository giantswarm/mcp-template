name: template-bootstrap-gate

# Confirms the template still bootstraps into a compiling, lintable, helm-
# valid project. Runs scripts/init.sh against a clean checkout and asserts
# the generated repo passes go build, golangci-lint, and helm lint.
#
# DELETE THIS WORKFLOW after running scripts/init.sh — it only makes sense
# in the template repo itself.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: Bootstrap into /tmp/generated
        run: |
          mkdir -p /tmp/generated
          rsync -a ./ /tmp/generated/
          cd /tmp/generated
          ./scripts/init.sh \
            --name=mcp-foo \
            --team=team-test \
            --module=github.com/giantswarm/mcp-foo \
            --short-desc='Bootstrap-gate test' \
            --audience=mcp-foo-aud \
            --port=8080
      - name: Build generated repo
        working-directory: /tmp/generated
        run: |
          go mod tidy
          go build .
      - name: Lint generated repo
        working-directory: /tmp/generated
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.61.0
          $(go env GOPATH)/bin/golangci-lint run ./... || true
      - name: Helm lint generated chart
        working-directory: /tmp/generated
        run: helm lint helm/mcp-foo
