version: 2.1
orbs:
  architect: giantswarm/architect@7.0.0

workflows:
  build:
    jobs:
      - architect/go-build:
          name: go-build-{MCP-NAME}
          binary: "{MCP-NAME}"
          # Picks up the root main.go (./).
          filters:
            tags:
              only: /^v.*/

      # Branch builds: amd64 only for faster PR feedback.
      - architect/push-to-registries-multiarch:
          context: architect
          name: push-to-registries
          platforms: "linux/amd64"
          requires:
            - go-build-{MCP-NAME}
          filters:
            branches:
              ignore:
                - main

      # Tag builds: push multi-arch image to gsoci (primary registry).
      - architect/push-to-registries-multiarch:
          context: architect
          name: push-to-gsoci-release
          registries-data: "public gsoci.azurecr.io ACR_GSOCI_USERNAME ACR_GSOCI_PASSWORD true"
          requires:
            - go-build-{MCP-NAME}
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

      # Tag builds: push multi-arch image to all registries (incl. mirrors).
      - architect/push-to-registries-multiarch:
          context: architect
          name: push-to-all-registries-release
          requires:
            - go-build-{MCP-NAME}
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

      - architect/push-to-app-catalog:
          executor: app-build-suite
          context: architect
          name: build-{MCP-NAME}-chart
          app_catalog: giantswarm-catalog
          app_catalog_test: giantswarm-test-catalog
          chart: "{MCP-NAME}"
          push_to_appcatalog: false
          push_to_oci_registry: false
          persist_chart_archive: true
          requires:
            - go-build-{MCP-NAME}
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore:
                - main

      - architect/run-tests-with-ats:
          name: execute chart tests
          requires:
            - build-{MCP-NAME}-chart
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore:
                - main

      # Branch: push chart after tests + amd64 image.
      - architect/push-to-app-catalog:
          executor: app-build-suite
          context: architect
          name: push-{MCP-NAME}-to-giantswarm-app-catalog
          app_catalog: giantswarm-catalog
          app_catalog_test: giantswarm-test-catalog
          chart: "{MCP-NAME}"
          requires:
            - execute chart tests
            - push-to-registries
          filters:
            branches:
              ignore:
                - main

      # Tag: push chart after tests + gsoci image.
      - architect/push-to-app-catalog:
          executor: app-build-suite
          context: architect
          name: push-{MCP-NAME}-to-giantswarm-app-catalog-release
          app_catalog: giantswarm-catalog
          app_catalog_test: giantswarm-test-catalog
          chart: "{MCP-NAME}"
          requires:
            - execute chart tests
            - push-to-gsoci-release
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
