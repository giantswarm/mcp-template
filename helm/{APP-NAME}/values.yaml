# Default values for {APP-NAME}.
# This chart ships secure-by-default: hardened SecurityContext, NetworkPolicy
# default-deny, ServiceMonitor on, OAuth required. Override per-environment.

image:
  name: "giantswarm/{APP-NAME}"
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent
registry:
  domain: gsoci.azurecr.io

replicas: 2

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  port: 8080
  metricsPort: 9091

ingress:
  enabled: false
  className: ""
  host: ""
  tls:
    enabled: false
    secretName: ""

# OAuth gates the /mcp endpoint. Disable only for stdio-only deployments.
# Every knob below maps to an OAUTH_* env var consumed by mcp-oauth's
# oauthconfig package — see https://pkg.go.dev/github.com/giantswarm/mcp-oauth/oauthconfig.
oauth:
  enabled: true
  # Identity provider. dex | google | github. Template ships dex; switching
  # to google/github also requires populating the matching values block
  # below (not provided by default — add it inline if needed).
  provider: dex
  # OAuth issuer for THIS server (its own /oauth/* endpoints). Loopback
  # values (http://localhost, http://127.0.0.1, http://[::1]) are accepted
  # without setting allowInsecureHTTP — see RFC 8252 §7.3.
  issuerURL: ""
  audience: "{APP-NAME}-audience"
  scopes:
    - openid
    - email
    - groups
  # When true, pre-flights with http:// issuers other than the loopback
  # exception above. Off by default; flip only for a private-network test
  # rig you control end-to-end.
  allowInsecureHTTP: false
  # When true, accepts http://127.0.0.1 / http://[::1] redirect URIs from
  # public clients (RFC 8252 native-app loopback). Required for desktop
  # IDE clients that loop back to a localhost callback.
  allowLocalhostRedirectURIs: false
  # Dex provider config. The redirect URL is auto-derived from issuerURL
  # ("${issuerURL}/oauth/callback") since v0.2.115 — no need to template
  # it here.
  dex:
    issuerURL: ""
    clientIDSecretRef:
      name: ""
      key: client-id
    clientSecretSecretRef:
      name: ""
      key: client-secret
  # Trusted audiences for SSO token forwarding (RFC 8693). Each entry must
  # match [a-zA-Z0-9_-]{1,256}; URL-shaped audiences are rejected at
  # startup since v0.2.113.
  trustedAudiences: []
  # URI schemes accepted during public client registration without a
  # registration access token (e.g., cursor, vscode).
  trustedRedirectSchemes: []
  # Optional 32-byte AES-GCM key for encrypting tokens at rest. Accepts
  # base64 (canonical) or hex. When unset, tokens are stored in plaintext.
  encryptionKeySecretRef:
    name: ""
    key: encryption-key
  # Optional 32-byte HMAC key for derived session IDs. When unset,
  # mcp-oauth falls back to SHA-256 derivation.
  sessionIDHMACKeySecretRef:
    name: ""
    key: session-id-hmac-key

storage:
  # memory: per-pod, lost on restart, NOT shared across replicas.
  # valkey: required for replicas > 1.
  kind: valkey
  valkey:
    address: ""
    passwordSecretRef:
      name: ""
      key: password
    tls: true

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

# Default-deny egress. Add upstream hosts (Dex, Valkey, OTEL collector,
# your domain backend) to egressAllowlist.
networkPolicy:
  enabled: true
  egressAllowlist: []
  # Example:
  # egressAllowlist:
  #   - to:
  #       - namespaceSelector:
  #           matchLabels: {kubernetes.io/metadata.name: dex-system}
  #     ports:
  #       - protocol: TCP
  #         port: 5556

podDisruptionBudget:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

# OTEL endpoint. Empty disables tracing entirely.
otel:
  endpoint: ""
  protocol: http/protobuf  # or grpc

# Any additional non-secret env vars.
extraEnv: []
# Any Secret refs to mount as env vars.
extraEnvFromSecretRefs: []

# Pod-level security context. Hardened by default.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

# Container-level security context.
securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

serviceAccount:
  create: true
  name: ""
  annotations: {}

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

nameOverride: ""
fullnameOverride: ""
